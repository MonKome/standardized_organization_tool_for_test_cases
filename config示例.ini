[paths]
input_folder = 
output_path = ./outfile/测试案例(汇总).xlsx

[settings]
# 目标Sheet名称，支持多个，用逗号(半角/全角)、顿号、空格分隔
# 示例: sheet_name = 测试案例
# 示例: sheet_name = 测试案例, 测试用例
# 示例: sheet_name = Sheet1，Sheet2，Sheet3
# 多Sheet时:
#   - 所有Sheet的数据按相同列映射逻辑处理并合并
#   - 自动添加"来源Sheet"列追踪每条数据来自哪个Sheet
#   - 输出Sheet名称为"合并汇总"
sheet_name = 测试案例, 测试用例, Sheet1
source_column_name = 来源文件

# 标准模板列名，用逗号分隔
[column_mapping]
template_columns = 用例编号, 系统模块名称, 子模块名称, 标题, 用例等级, 前置条件, 步骤描述, 预期结果, 测试结果, 测试人员, 备注

# 定义每一列可能的近义词，格式为: 标准列名 = 近义词1, 近义词2, ...
用例编号 = TestCaseID, Case ID, 编号, 用例ID, 用例名称
系统模块名称 = SystemModule, Module, 系统模块, 模块名称
子模块名称 = SubModule, Sub-Module, 子模块, 子系统, 所属模块
标题 = Title, Case Title, 描述, 用例标题, 测试项
用例等级 = Priority, Level, 优先级, 重要程度
前置条件 = Prerequisites, Precondition, 前提条件, 预设条件
步骤描述 = Steps, Step Description, 操作步骤, 测试步骤
预期结果 = Expected Result, Expectation, 期望结果, 预期
测试结果 = Actual Result, Result, 执行结果
测试人员 = Tester, Test By, 执行人, 测试员, 责任人
备注 = Notes, Comment, Remark, 附注
